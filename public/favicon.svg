<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Matte graphite gradient: warm dark grey, top-left light source -->
    <linearGradient id="bgGrad" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0%"   stop-color="#48443F"/>
      <stop offset="55%"  stop-color="#2C2A27"/>
      <stop offset="100%" stop-color="#181614"/>
    </linearGradient>

    <!-- Subtle matte top sheen (not glossy) -->
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Text drop shadow for depth -->
    <filter id="txtDepth" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2.5" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.65"/>
    </filter>
  </defs>

  <!-- Lifted shadow (3D lift) -->
  <rect x="4" y="6" width="92" height="92" rx="19" fill="#000000" opacity="0.30"/>

  <!-- Main face -->
  <rect width="100" height="100" rx="20" fill="url(#bgGrad)"/>

  <!-- Matte top sheen -->
  <rect width="100" height="100" rx="20" fill="url(#sheen)"/>

  <!-- Rim highlight: thin bright edge on top/left -->
  <rect x="1" y="1" width="98" height="98" rx="19.5"
        fill="none" stroke="#ffffff" stroke-opacity="0.13" stroke-width="1.5"/>

  <!-- Text: 3D extrusion — dark offset layers build depth -->
  <text x="53" y="71" font-family="Inter,sans-serif" font-size="52" font-weight="700"
        text-anchor="middle" fill="#0C0B09" opacity="0.65">AK</text>
  <text x="52" y="70" font-family="Inter,sans-serif" font-size="52" font-weight="700"
        text-anchor="middle" fill="#1C1A17" opacity="0.55">AK</text>

  <!-- Main text -->
  <text x="50" y="68" font-family="Inter,sans-serif" font-size="52" font-weight="700"
        text-anchor="middle" fill="#EAE6E1" filter="url(#txtDepth)">AK</text>
</svg>
